name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.5']
    steps:
      - name: App auschecken
        uses: actions/checkout@v7
        with:
          path: app
      - name: LocalBase-Referenz bestimmen
        id: localbase-ref
        env:
          CANDIDATE_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          if git ls-remote --exit-code --heads https://github.com/Filzmann/nextcloud-localbase.git "refs/heads/$CANDIDATE_REF" >/dev/null 2>&1; then
            echo "ref=$CANDIDATE_REF" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi
      - name: LocalBase auschecken
        uses: actions/checkout@v7
        with:
          repository: Filzmann/nextcloud-localbase
          ref: ${{ steps.localbase-ref.outputs.ref }}
          path: localbase
      - name: PHP einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: none
      - name: PHP-Tests
        working-directory: app
        run: php tests/run.php

  javascript:
    name: JavaScript
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: App auschecken
        uses: actions/checkout@v7
        with:
          path: app
      - name: LocalBase-Referenz bestimmen
        id: localbase-ref
        env:
          CANDIDATE_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          if git ls-remote --exit-code --heads https://github.com/Filzmann/nextcloud-localbase.git "refs/heads/$CANDIDATE_REF" >/dev/null 2>&1; then
            echo "ref=$CANDIDATE_REF" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi
      - name: LocalBase auschecken
        uses: actions/checkout@v7
        with:
          repository: Filzmann/nextcloud-localbase
          ref: ${{ steps.localbase-ref.outputs.ref }}
          path: localbase
      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: JavaScript-Tests
        working-directory: app
        run: node tests/run-js.mjs
